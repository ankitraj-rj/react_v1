<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

  <body>
    <div id="root">
     
    </div>

    <script>
        const divRoot = document.getElementById("root")

        h1Tag.innerText = "Hello World from js DOM"
        divRoot.appendChild(h1Tag)
    </script>
  </body>
